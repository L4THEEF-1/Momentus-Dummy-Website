<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <style>
.form-container {
    background: #f9f9f9;
    padding: 30px;
    border-radius: 10px;
    max-width: 400px;
    margin: 50px auto;
    box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.2);
    border: 1px solid #ddd;
}

.form-container h1 {
    font-size: 24px;
    font-weight: bold;
    text-align: center;
    color: #333;
    margin-bottom: 20px;
}

form label {
    font-size: 14px;
    font-weight: bold;
    color: #555;
    margin-bottom: 5px;
    display: block;
}

form input[type="text"],
form input[type="email"],
form input[type="password"] {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border: 1px solid #ddd;
    border-radius: 5px;
    box-sizing: border-box;
    font-size: 14px;
    color: #333;
    background-color: #f7f7f7;
}

form button {
    width: 100%;
    padding: 10px 15px;
    margin-bottom: 5px;
    font-size: 16px;
    font-weight: bold;
    border: none;
    border-radius: 5px;
    color: white;
    cursor: pointer;
}

    .logo-container {
      position: relative;
      display: inline-block;
    }

    .logo-container img {
      width: 100px;
    }

    .logo-container .hover-text {
      display: none;
      position: absolute;
      top: 100%;
      left: 100%;
      transform: translateX(-50%);
      background-color: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 5px;
      border-radius: 5px;
      font-size: 12px;
    }

    .logo-container:hover .hover-text {
      display: block;
      font-family: 'Poppins';
    }
    </style>
</head>
<body>


<nav>
        <div class="logo">
            <div class="logo-container">
                <a href="login.php"><img src="momentusLogo.png" alt="Momentus Logo"></a>
                <div class="hover-text">Login Here..</div>
            </div>
        </div>
    <div class="navLinks">
        <a href="index.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="index1.html">Booking</a>
        <a href="contact.html">Contact Us</a>
    </div>
</nav>

    <div class="form-container">
        <h1 style="font-family: 'Poppins';">Login</h1>
        <form method="post">
            <label for="email" style="font-family: 'Poppins';">Email:</label>
            <input type="email" name="email" id="email" placeholder="Enter your email" required style="font-family: 'Poppins';">
            
            <label for="password" style="font-family: 'Poppins';">Password:</label>
            <input type="password" name="password" id="password" placeholder="Enter your password" required style="font-family: 'Poppins';">
            
            <button href="login1.html" type="submit" value="Submit" style="background-color: #6E1717; font-family: 'Poppins';">Login</button>
        </form>
        <p>Don't have an account? <a href="signup.html">Sign Up Here</a></p>
    </div>
</body>
</html>
